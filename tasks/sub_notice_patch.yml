---
- block:
    - name: Get Proxmox VE version
      command: pveversion
      register: pveversion_cmd
      changed_when: false

    - name: Extract Proxmox VE major version
      set_fact:
        proxmox_ve_major_version: "{{ (pveversion_cmd.stdout | regex_search('pve-manager/([0-9]+)\\.', '\\1') | first) | int }}"

    - name: Check if Subscription Notice patch is already applied
      command: grep -q '// Ansible patch' /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
      register: patch_check
      failed_when: false
      changed_when: false

    - block:
        - name: Get current date and time for backup
          command:
            cmd: date +"%Y%m%d%H%M%S"
          register: current_date
          changed_when: false

        - name: Backup proxmoxlib.js
          copy:
            src: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
            dest: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js.bak_{{ current_date.stdout }}
            remote_src: true
          become: true

        - name: Hide annoying Subscription Notice for Proxmox VE <= 8
          replace:
            path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
            regexp: (function\(orig_cmd\) \{)
            replace: \1\n\t// Ansible patch\n\torig_cmd();\n\treturn;
            backup: true
          notify: Restart pveproxy
          become: true
          when: (proxmox_ve_major_version | int) <= 8

        - name: Hide annoying Subscription Notice for Proxmox VE >= 9
          replace:
            path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
            regexp: "(^\\s*)Ext\\.Msg\\.show\\(\\{\\n(\\s*)title: gettext\\('No valid subscription'\\),"
            replace: |
              \1// Ansible patch: pve9
              \1void({
              \2title: gettext('No valid subscription'),
            backup: true
          notify: Restart pveproxy
          become: true
          when: (proxmox_ve_major_version | int) >= 9

      when: patch_check.rc != 0

  tags: sub_notice_patch
